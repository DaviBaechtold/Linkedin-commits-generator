name: CI

# Roda em PRs e pushes para main (dev) e prod (produção).
# Garante que typecheck + build passam antes de qualquer deploy.
on:
  pull_request:
    branches: [main, prod]
  push:
    branches: [main, prod]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Placeholders — o build não executa as rotas dinâmicas, só precisa
          # que as vars existam para satisfazer as asserções non-null.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: https://commitpost.vercel.app
